apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  namespace: default
  labels:
    app: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
      - name: course-app
        image: witcher619/home_projects:course-app
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          timeoutSeconds: 1
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 1
        env:
        - name: APP_MESSAGE
          valueFrom:
            configMapKeyRef:
              name: course-app-config
              key: appmessage
        - name: APP_STORE
          valueFrom:
            configMapKeyRef:
              name: course-app-config
              key: appstore
        - name: APP_REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: course-app-config
              key: redisurl
      imagePullSecrets:
      - name: private-repo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
